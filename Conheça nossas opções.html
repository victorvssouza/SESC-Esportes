<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modalidades SESC</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            max-width: 720px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .titulo {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 30px;
        }

        .select-box {
            margin-bottom: 20px;
            position: relative;
        }

        .select-box::after {
            content: "\f078";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        select {
            width: 100%;
            height: 60px;
            border: 1px solid #e0e0e0;
            border-radius: 50px;
            padding: 0 25px;
            font-size: 16px;
            background: #fff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, .05);
            appearance: none;
            outline: none;
            cursor: pointer;
        }

        .card {
            width: 100%;
            background: #fff;
            border-radius: 20px;
            padding: 30px 25px;
            border: 2px solid #2b579a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 220px;
            overflow: hidden;
        }

        #bloco-dinamico {
            width: 100%;
            text-align: center;
        }

        #bloco-dinamico h2 {
            color: #0b4aa2;
            font-size: 18px;
            margin-bottom: 25px;
        }

        /* LISTAS CORRIGIDAS */
        .lista-modalidades {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 12px;
            /*flex-wrap: nowrap;*/
            flex-wrap: wrap;
            justify-content: center;
            /* Centraliza os itens quando quebrar linha */

            width: fit-content;
            max-width: 100%;
            margin: 0 auto;

            overflow-x: auto;
            padding-bottom: 12px;
            padding-left: 2px;
            padding-right: 2px;

            -ms-overflow-style: none;
            scrollbar-width: thin;
        }

        .lista-modalidades::-webkit-scrollbar {
            height: 6px;
        }

        .lista-modalidades::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }

        .item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #2b579a;
            white-space: nowrap;
        }

        .item span {
            font-weight: 700;
        }

        /* ÍCONES E IMAGENS */
        #bloco-dinamico .item i,
        #bloco-dinamico .item .material-symbols-outlined {
            font-size: 28px;
            width: 30px;
            text-align: center;
        }

        #bloco-dinamico .item span {
            font-size: 17px;
        }

        #bloco-dinamico .item img {
            width: 28px;
            height: 28px;
            object-fit: contain;
            flex-shrink: 0;
            filter: brightness(0) saturate(100%) invert(29%) sepia(42%) saturate(1192%) hue-rotate(189deg) brightness(92%) contrast(91%);
        }

        .divisor {
            width: 1px;
            height: 26px;
            background: #ccc;
            flex-shrink: 0;
        }

        /* AVISO */
        #bloco-aviso {
            display: flex;
            align-items: center;
            gap: 30px;
            width: 100%;
        }

        #bloco-aviso img {
            width: 120px;
        }

        .aviso-texto h2 {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .aviso-texto p {
            margin-bottom: 12px;
            line-height: 1.4;
        }

        /* MOBILE */
        @media(max-width: 600px) {
            .lista-modalidades {
                scrollbar-width: none;
            }

            .lista-modalidades::-webkit-scrollbar {
                display: none;
            }

            .divisor {
                display: none;
            }

            #bloco-aviso {
                flex-direction: column;
                text-align: center;
            }

            #bloco-dinamico .item i {
                font-size: 26px;
            }

            #bloco-dinamico .item span {
                font-size: 16px;
            }

            #bloco-dinamico .item img {
                width: 26px;
                height: 26px;
            }
        }
    </style>

</head>

        // 3. Estrutura do Aviso
        const htmlAviso = `
    <div id="bloco-aviso">
        <img src="https://esportes.sescpe.com.br/wp-content/uploads/2026/05/Captura-de-tela-2026-05-11-102031.png">
        <div class="aviso-texto">
            <h2>Estamos ampliando as inscrições on-line das modalidades e atividades esportivas para todas as unidades.</h2>
            <p>Fique de olho: em junho, novas opções estarão disponíveis aqui para você!!</p>
            <p>Enquanto isso, procure a Central de Relacionamento do Sesc de sua preferência.</p>
        </div>
    </div>
`;

        // 4. Lógica de Renderização
        const select = document.getElementById("unidadeSelect");
        const containerDinamico = document.getElementById("conteudo-dinamico");

        function renderizarConteudo() {
            const unidadeSelecionadaId = select.value;
            const dadosUnidade = bancoUnidades[unidadeSelecionadaId];

            containerDinamico.innerHTML = "";

            if (dadosUnidade && dadosUnidade.modalidades.length > 0) {

                let htmlModalidades = `
            <div id="bloco-dinamico">
                <h2>As modalidades disponíveis no ${dadosUnidade.nome} são:</h2>
                <div class="lista-modalidades">
        `;

                dadosUnidade.modalidades.forEach((modKey, index) => {
                    const mod = bancoModalidades[modKey];

                    htmlModalidades += `
                <div class="item">
                    ${mod.icone}
                    <span>${mod.nome}</span>
                </div>
            `;

                    if (index < dadosUnidade.modalidades.length - 1) {
                        htmlModalidades += `<div class="divisor"></div>`;
                    }
                });

                htmlModalidades += `</div></div>`;
                containerDinamico.innerHTML = htmlModalidades;

            } else {
                containerDinamico.innerHTML = htmlAviso;
            }

            // Força o scroll voltar para o começo quando trocar de unidade
            const lista = document.querySelector('.lista-modalidades');
            if (lista) lista.scrollLeft = 0;
        }

        // 5. Iniciar
        select.addEventListener("change", renderizarConteudo);
        renderizarConteudo();

    </script>
