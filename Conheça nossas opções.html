<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modalidades SESC</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.container {
    max-width: 720px;
    margin: 40px auto;
    padding: 0 20px;
}

.titulo {
    text-align: center;
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 30px;
}

.select-box {
    margin-bottom: 20px;
    position: relative;
}

.select-box::after {
    content: "\f078";
    font-family: "Font Awesome 6 Free";
    font-weight: 900;
    position: absolute;
    right: 25px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
}

select {
    width: 100%;
    height: 60px;
    border: 1px solid #e0e0e0;
    border-radius: 50px;
    padding: 0 25px;
    font-size: 16px;
    background: #fff;
    box-shadow: 0 4px 15px rgba(0,0,0,.05);
    appearance: none;
    outline: none;
    cursor: pointer;
}

.card {
    width: 100%;
    background: #fff;
    border-radius: 20px;
    padding: 30px 25px;
    border: 2px solid #2b579a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 220px;
    overflow: hidden;
}

#bloco-dinamico {
    width: 100%;
    text-align: center;
}

#bloco-dinamico h2 {
    color: #0b4aa2;
    font-size: 18px;
    margin-bottom: 25px;
}

/* LISTAS */
.lista-modalidades {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    flex-wrap: nowrap;
    width: 100%;
    /* Adicionado overflow e padding para garantir rolagem em unidades com muitas modalidades (ex: Goiana) */
    overflow-x: auto;
    padding-bottom: 10px;
    -ms-overflow-style: none;
    scrollbar-width: thin; 
}

.lista-modalidades::-webkit-scrollbar {
    height: 6px;
}

.lista-modalidades::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 10px;
}

.item {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #2b579a;
    white-space: nowrap;
}

.item span {
    font-weight: 700;
}

/* ÍCONES E IMAGENS */
#bloco-dinamico .item i {
    font-size: 28px;
    width: 30px;
    text-align: center;
}

#bloco-dinamico .item span {
    font-size: 17px;
}

#bloco-dinamico .item img {
    width: 28px;
    height: 28px;
    object-fit: contain;
    flex-shrink: 0;
    filter: brightness(0) saturate(100%) invert(29%) sepia(42%) saturate(1192%) hue-rotate(189deg) brightness(92%) contrast(91%);
}

.divisor {
    width: 1px;
    height: 26px;
    background: #ccc;
    flex-shrink: 0;
}

/* AVISO */
#bloco-aviso {
    display: flex;
    align-items: center;
    gap: 30px;
    width: 100%;
}

#bloco-aviso img {
    width: 120px;
}

.aviso-texto h2 {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 12px;
}

.aviso-texto p {
    margin-bottom: 12px;
    line-height: 1.4;
}

/* MOBILE */
@media(max-width: 600px) {
    .lista-modalidades {
        justify-content: flex-start;
        scrollbar-width: none; /* Oculta a barra nativa no celular para manter o visual limpo */
    }

    .lista-modalidades::-webkit-scrollbar {
        display: none;
    }

    .divisor {
        display: none;
    }

    #bloco-aviso {
        flex-direction: column;
        text-align: center;
    }

    #bloco-dinamico .item i {
        font-size: 26px;
    }

    #bloco-dinamico .item span {
        font-size: 16px;
    }

    #bloco-dinamico .item img {
        width: 26px;
        height: 26px;
    }
}
</style>

</head>

<body>

<div class="container">

    <h1 class="titulo">
        Conheça nossas opções
    </h1>

    <div class="select-box">
        <select id="unidadeSelect">
            <option value="arcoverde">SESC - PE ARCOVERDE</option>
            <option value="belo-jardim">SESC - PE BELO JARDIM</option>
            <option value="caruaru">SESC - PE CARUARU</option>
            <option value="casa-amarela">SESC - PE CASA AMARELA</option>
            <option value="triunfo">SESC - PE CTL TRIUNFO</option>
            <option value="floresta">SESC - PE FLORESTA</option>
            <option value="garanhuns">SESC - PE GARANHUNS</option>
            <option value="goiana">SESC - PE GOIANA</option>
            <option value="araripina">SESC - PE LER ARARIPINA</option>
            <option value="bodoco">SESC - PE LER BODOCÓ</option>
            <option value="buique">SESC - PE LER BUIQUE</option>
            <option value="sao-lourenco">SESC - PE LER SÃO LOURENÇO</option>
            <option value="surubim">SESC - PE LER SURUBIM</option>
            <option value="petrolina">SESC - PE PETROLINA</option>
            <option value="piedade">SESC - PE PIEDADE</option>
            <option value="santa-rita">SESC - PE SANTA RITA</option>
            <option value="santo-amaro" selected>SESC - PE SANTO AMARO</option>
            <option value="serra-talhada">SESC - PE SERRA TALHADA</option>
        </select>
    </div>

    <div class="card">
        <div id="conteudo-dinamico" style="width: 100%;"></div>
    </div>

</div>

<script>
// 1. Dicionário Central de Modalidades
const bancoModalidades = {
    alongamento: { nome: "Alongamento", icone: '<i class="fa-solid fa-person-stretching"></i>' },
    beach_tennis: { nome: "Beach Tennis", icone: '<i class="fa-solid fa-table-tennis-paddle-ball"></i>' },
    corrida: { nome: "Corrida Orientada", icone: '<i class="fa-solid fa-stopwatch"></i>' },
    funcional_kids: { nome: "Funcional Kids", icone: '<i class="fa-solid fa-child-reaching"></i>' },
    futebol_campo: { nome: "Futebol de Campo", icone: '<i class="fa-regular fa-futbol"></i>' },
    futebol_society: { nome: "Futebol Society", icone: '<i class="fa-solid fa-futbol"></i>' },
    futsal: { nome: "Futsal", icone: '<i class="fa-regular fa-futbol"></i>' },
    ginastica: { nome: "Ginástica Multifuncional", icone: '<i class="fa-solid fa-person-running"></i>' },
    handebol: { nome: "Handebol", icone: '<img src="https://esportes.sescpe.com.br/wp-content/uploads/2026/05/sports_handball_24dp_1F1F1F_FILL0_wght400_GRAD0_opsz24.png">' },
    hidroginastica: { nome: "Hidroginástica", icone: '<img src="https://esportes.sescpe.com.br/wp-content/uploads/2026/05/icons8-boia-50.png">' },
    judo: { nome: "Judô", icone: '<i class="fa-solid fa-user-ninja"></i>' },
    movemente: { nome: "Movemente 60+", icone: '<i class="fa-solid fa-heart-pulse"></i>' },
    musculacao: { nome: "Musculação", icone: '<i class="fa-solid fa-dumbbell"></i>' },
    natacao: { nome: "Natação", icone: '<img src="https://esportes.sescpe.com.br/wp-content/uploads/2026/05/pool_24dp_1F1F1F_FILL0_wght400_GRAD0_opsz24.png">' },
    pilates: { nome: "Pilates de Solo", icone: '<i class="fa-solid fa-spa"></i>' },
    voleibol: { nome: "Voleibol", icone: '<i class="fa-solid fa-volleyball"></i>' }
};

// 2. Dicionário de Unidades
const bancoUnidades = {
    "arcoverde": { nome: "Sesc Arcoverde", modalidades: ["alongamento", "futsal", "ginastica", "hidroginastica", "musculacao", "natacao", "pilates"] },
    "belo-jardim": { nome: "Sesc Belo Jardim", modalidades: ["futsal", "musculacao", "natacao"] },
    "caruaru": { nome: "Sesc Caruaru", modalidades: ["futsal", "futebol_society", "hidroginastica", "musculacao", "natacao"] },
    "casa-amarela": { nome: "Sesc Casa Amarela", modalidades: ["ginastica", "hidroginastica", "movemente", "natacao", "pilates"] },
    "triunfo": { nome: "Sesc CTL Triunfo", modalidades: ["natacao"] },
    "floresta": { nome: "Sesc Floresta", modalidades: ["futebol_society", "hidroginastica", "natacao"] },
    "garanhuns": { nome: "Sesc Garanhuns", modalidades: ["futsal", "hidroginastica", "movemente", "musculacao", "natacao", "voleibol"] },
    "goiana": { nome: "Sesc Goiana", modalidades: ["beach_tennis", "corrida", "funcional_kids", "futebol_campo", "futebol_society", "futsal", "ginastica", "hidroginastica", "judo", "musculacao", "natacao", "voleibol"] },
    "araripina": { nome: "Sesc Ler Araripina", modalidades: ["futsal", "futebol_society", "ginastica", "hidroginastica", "musculacao", "natacao"] },
    "bodoco": { nome: "Sesc Ler Bodocó", modalidades: ["futsal", "handebol", "hidroginastica", "natacao"] },
    "buique": { nome: "Sesc Ler Buíque", modalidades: ["futsal", "hidroginastica", "natacao"] },
    "sao-lourenco": { nome: "Sesc Ler São Lourenço", modalidades: ["ginastica", "movemente", "natacao"] },
    "surubim": { nome: "Sesc Ler Surubim", modalidades: ["futebol_society", "hidroginastica", "natacao"] },
    "petrolina": { nome: "Sesc Petrolina", modalidades: ["funcional_kids", "futsal", "ginastica", "hidroginastica", "movemente", "musculacao", "natacao"] },
    "piedade": { nome: "Sesc Piedade", modalidades: ["alongamento", "beach_tennis", "funcional_kids", "futebol_society", "hidroginastica", "judo", "movemente", "musculacao", "natacao", "pilates"] },
    "santa-rita": { nome: "Sesc Santa Rita", modalidades: ["alongamento", "ginastica", "pilates"] },
    "santo-amaro": { nome: "Sesc Santo Amaro", modalidades: ["futsal", "musculacao", "voleibol"] },
    "serra-talhada": { nome: "Sesc Serra Talhada", modalidades: ["futebol_society", "hidroginastica", "musculacao", "natacao"] }
};

// 3. Estrutura do Aviso (Mantida por segurança caso alguma unidade futura não tenha esportes cadastrados)
const htmlAviso = `
    <div id="bloco-aviso">
        <img src="https://esportes.sescpe.com.br/wp-content/uploads/2026/05/Captura-de-tela-2026-05-11-102031.png">
        <div class="aviso-texto">
            <h2>Estamos ampliando as inscrições on-line das modalidades e atividades esportivas para todas as unidades.</h2>
            <p>Fique de olho: em junho, novas opções estarão disponíveis aqui para você!!</p>
            <p>Enquanto isso, procure a Central de Relacionamento do Sesc de sua preferência.</p>
        </div>
    </div>
`;

// 4. Lógica de Renderização
const select = document.getElementById("unidadeSelect");
const containerDinamico = document.getElementById("conteudo-dinamico");

function renderizarConteudo() {
    const unidadeSelecionadaId = select.value;
    const dadosUnidade = bancoUnidades[unidadeSelecionadaId];

    containerDinamico.innerHTML = "";

    if (dadosUnidade && dadosUnidade.modalidades.length > 0) {
        
        let htmlModalidades = `
            <div id="bloco-dinamico">
                <h2>As modalidades disponíveis no ${dadosUnidade.nome} são:</h2>
                <div class="lista-modalidades">
        `;

        dadosUnidade.modalidades.forEach((modKey, index) => {
            const mod = bancoModalidades[modKey];
            
            htmlModalidades += `
                <div class="item">
                    ${mod.icone}
                    <span>${mod.nome}</span>
                </div>
            `;

            if (index < dadosUnidade.modalidades.length - 1) {
                htmlModalidades += `<div class="divisor"></div>`;
            }
        });

        htmlModalidades += `</div></div>`;
        containerDinamico.innerHTML = htmlModalidades;

    } else {
        containerDinamico.innerHTML = htmlAviso;
    }
    
    // Força o scroll voltar para o começo quando trocar de unidade
    const lista = document.querySelector('.lista-modalidades');
    if(lista) lista.scrollLeft = 0;
}

// 5. Iniciar
select.addEventListener("change", renderizarConteudo);
renderizarConteudo();

</script>

</body>
</html>
